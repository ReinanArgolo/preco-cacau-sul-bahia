name: Coleta diária

on:
  schedule:
    # 18h30 em Brasília (UTC-3). O cron do GitHub Actions usa UTC.
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: cocoa-daily-collection
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      COCOA_LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependências
        run: pip install -e '.[dev]'
      - name: Coletar e persistir
        id: collect
        continue-on-error: true
        run: python -m cocoa_data collect --source all --status-file data/reports/collection_status.json
      - name: Validar qualidade
        id: quality
        continue-on-error: true
        run: python -m cocoa_data quality-check --status-file data/reports/quality_status.json
      - name: Sincronizar issues das fontes
        if: always() && hashFiles('data/reports/collection_status.json') != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python scripts/sync_collection_issues.py
          data/reports/collection_status.json
          --quality-status data/reports/quality_status.json
      - name: Guardar diagnóstico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-status-${{ github.run_number }}
          path: |
            data/reports/collection_status.json
            data/reports/quality_status.json
          if-no-files-found: warn
          retention-days: 30
      - name: Reprovar execução degradada
        if: always() && (steps.collect.outcome == 'failure' || steps.quality.outcome == 'failure')
        run: exit 1
